<!doctype html><html><head><meta charset="utf-8"><title>Lottie Asset Brief Builder</title><style>body{font-family:system-ui;background:#0f172a;color:#e5e7eb;margin:0;padding:24px}main{max-width:760px;margin:auto}.card{background:#111827;border:1px solid #334155;border-radius:16px;padding:18px;margin:14px 0}label{display:block;margin:10px 0 4px}input,textarea,select{width:100%;border-radius:10px;border:1px solid #475569;background:#020617;color:#fff;padding:10px}button{background:#8b5cf6;color:white;border:0;border-radius:10px;padding:12px 16px}pre{white-space:pre-wrap;background:#020617;padding:14px;border-radius:12px}</style></head><body><main><h1>Lottie Asset Brief Builder</h1><p>Prepare a precise text-to-Lottie prompt; template-ready, not validated.</p><div class="card"><label>Product moment</label><input id="moment" placeholder="e.g. resume upload success"><label>Emotion</label><input id="emotion" placeholder="relief, momentum, trust"><label>Loop length</label><select id="len"><option>2 seconds</option><option>4 seconds</option><option>6 seconds</option></select><label>Constraints</label><textarea id="constraints">simple shapes, brand-safe, lightweight JSON, transparent background</textarea><button onclick="build()">Build brief</button></div><div class="card"><h2>Copyable brief</h2><pre id="out"></pre></div><script>function build(){out.textContent=`Generate a production-ready Lottie animation for: ${moment.value}
Emotion: ${emotion.value}
Loop length: ${len.value}
Constraints: ${constraints.value}
Deliver public/lottie.json plus a one-line review note.
Acceptance: smooth loop, under 200KB, readable at mobile size, no raster assets.`}build()</script></main></body></html>

<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520"><rect width="800" height="520" fill="#020617"/><text x="40" y="45" fill="#a78bfa" font-size="30" font-family="Inter,Arial">Agent Motion Asset Pipeline</text><rect x="40" y="80" width="720" height="70" rx="16" fill="#111827" stroke="#a78bfa"/><text x="64" y="123" fill="#f8fafc" font-size="22">1. Pick one product moment</text><rect x="40" y="175" width="720" height="70" rx="16" fill="#111827" stroke="#a78bfa"/><text x="64" y="218" fill="#f8fafc" font-size="22">2. Write constraints as a motion brief</text><rect x="40" y="270" width="720" height="70" rx="16" fill="#111827" stroke="#a78bfa"/><text x="64" y="313" fill="#f8fafc" font-size="22">3. Agent generates public/lottie.json</text><rect x="40" y="365" width="720" height="70" rx="16" fill="#111827" stroke="#a78bfa"/><text x="64" y="408" fill="#f8fafc" font-size="22">4. Review in hot-reload harness</text><rect x="40" y="460" width="720" height="70" rx="16" fill="#111827" stroke="#a78bfa"/><text x="64" y="503" fill="#f8fafc" font-size="22">5. Ship or iterate with evidence</text></svg>
